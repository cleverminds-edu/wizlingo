name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_APP_URL: https://wizlingo.app
          DATABASE_URL: postgresql://user:password@localhost/wizlingo
          JWT_SECRET: test-secret-for-ci
          ANTHROPIC_API_KEY: dummy-key-for-ci
          WIZADMIN_SECRET: test-admin-secret
        run: npm run build

      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: next-build
          path: .next/
          retention-days: 7

      - name: Check build size
        run: |
          SIZE=$(du -sh .next/ | cut -f1)
          echo "Build size: $SIZE"
          # Warn if build exceeds 500MB
          if [ $(du -s .next/ | cut -f1) -gt 512000 ]; then
            echo "⚠️  Warning: Build size is large"
          fi
