<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 62" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&amp;display=swap');
    </style>

    <!-- Bubble fill: hot pink top-right → vivid purple bottom-left -->
    <linearGradient id="wl-bubble" x1="51" y1="5" x2="1" y2="44"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F43F88"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Bubble tail uses the same bottom colour -->
    <!-- Star inner radial glow -->
    <radialGradient id="wl-star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFDE7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD700"  stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══════════ ICON ═══════════ -->

  <!-- Soft drop-shadow for the bubble -->
  <rect x="4" y="9"  width="50" height="38" rx="13" fill="rgba(124,58,237,0.25)"/>

  <!-- Bubble body -->
  <rect x="1" y="5"  width="50" height="38" rx="13" fill="url(#wl-bubble)"/>

  <!-- Bubble tail (lower-left, pointing downward) -->
  <path d="M 11,42  L 2,57  L 24,42 Z" fill="#7C3AED"/>

  <!-- Inner sparkle — glow halo -->
  <ellipse cx="26" cy="24" rx="13" ry="13" fill="url(#wl-star-glow)"/>

  <!-- 4-pointed sparkle star (centred at 26,24) outer R=10 inner R=3.8 -->
  <path d="M26,14 L29.0,21.0 L36,24 L29.0,27.0 L26,34
           L23.0,27.0 L16,24 L23.0,21.0 Z"
        fill="#FFD700"/>

  <!-- Star inner bright highlight -->
  <path d="M26,18.5 L27.8,21.5 L31,23 L27.8,24.5 L26,27.5
           L24.2,24.5 L21,23 L24.2,21.5 Z"
        fill="#FFFDE7" opacity="0.75"/>

  <!-- Tiny centre dot -->
  <circle cx="26" cy="24" r="2.2" fill="white" opacity="0.6"/>

  <!-- Small accent sparkle — top-right of bubble -->
  <path d="M47,6 L48.2,8.8 L51,10 L48.2,11.2 L47,14
           L45.8,11.2 L43,10 L45.8,8.8 Z"
        fill="#FFD700" opacity="0.9"/>

  <!-- Tiny sparkle — top-left -->
  <path d="M4,7 L5,9.2 L7.2,10 L5,10.8 L4,13
           L3,10.8 L0.8,10 L3,9.2 Z"
        fill="#FFD700" opacity="0.75"/>

  <!-- Micro dot right side -->
  <circle cx="52" cy="30" r="2"  fill="#FFD700" opacity="0.55"/>
  <!-- Micro dot bottom -->
  <circle cx="38" cy="46" r="1.5" fill="#FFD700" opacity="0.45"/>

  <!-- ═══════════ WORDMARK ═══════════ -->
  <text
    x="62" y="44"
    font-family="'Fredoka', 'Nunito', 'Arial Rounded MT Bold', 'Arial Black', Arial, sans-serif"
    font-weight="400"
    font-size="36"
    letter-spacing="0.3"
  >
    <tspan fill="#F97316">Wiz</tspan><tspan fill="#9333EA">Lingo</tspan>
  </text>
</svg>
