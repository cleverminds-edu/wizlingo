<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>WizLingo — HD Video Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Inter:wght@300;400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#030308;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Inter',sans-serif;color:#fff}
    #c{width:100%;max-width:1280px;aspect-ratio:16/9;display:block;background:#000}
    #ui{display:flex;align-items:center;gap:14px;padding:16px;flex-wrap:wrap;justify-content:center;background:#08080f;width:100%;max-width:1280px;border-top:1px solid #151520}
    button{padding:12px 28px;border-radius:999px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
    button:hover{opacity:.88}button:disabled{opacity:.35;cursor:not-allowed}
    #btnPrev{background:linear-gradient(135deg,#3B82F6,#6366f1);color:#fff}
    #btnGen {background:linear-gradient(135deg,#F97316,#F43F88);color:#fff}
    #status{font-size:13px;color:rgba(255,255,255,.45);min-width:260px;text-align:center}
    #prog{width:100%;max-width:1280px;height:4px;background:#0d0d1a}
    #pbar{height:4px;width:0%;background:linear-gradient(90deg,#3B82F6,#9333EA,#F43F88)}
    .info{color:rgba(255,255,255,.25);font-size:12px;max-width:1280px;padding:12px 16px;text-align:center}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:6px;animation:pulse .9s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
  </style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<div id="prog"><div id="pbar"></div></div>
<div id="ui">
  <button id="btnPrev" onclick="startPreview()">▶ Preview</button>
  <button id="btnGen"  onclick="generateVideo()">🎬 Generate HD Video</button>
  <div id="status">Ready…</div>
</div>
<p class="info">Renders 1080p from canvas, zero quality loss. Downloads as WebM (12 Mbps). Convert to MP4 with Handbrake.</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CW = 1920, CH = 1080, TOTAL = 45, FPS = 30;

function loadImg(src){ return new Promise((r,e)=>{ const i=new Image(); i.onload=()=>r(i); i.onerror=e; i.src=src; }); }
let LOGO, EDV;
Promise.all([loadImg('wiziingo-logo.svg'), loadImg('edvanta-logo1.png')])
  .then(([l,d])=>{ LOGO=l; EDV=d; setStatus('Ready — Preview or Generate'); })
  .catch(()=>setStatus('Run via localhost:3000'));

function mulberry32(seed){ return ()=>{ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const rng = mulberry32(0xDEADBEEF);
const STARS = Array.from({length:340},()=>({x:rng(),y:rng(),r:.15+rng()*1.2,base:.25+rng()*.7,spd:.3+rng()*1.1,ph:rng()*Math.PI*2,big:rng()>.88}));

const PC_N=['rgba(96,165,250,','rgba(147,51,234,','rgba(200,230,255,'];
const PC_B=['rgba(249,115,22,','rgba(147,51,234,','rgba(244,63,136,','rgba(255,215,0,','rgba(96,165,250,'];
let pMul=1, burst=false;

class P { reset(i){ this.x=rng()*CW; this.y=i?rng()*CH:CH+10; this.r=.6+rng()*2.2; this.vx=(rng()-.5)*1.1; this.vy=-(0.5+rng()*1.8); this.life=0; this.max=230+rng()*300; const c=burst?PC_B:PC_N; this.col=c[Math.floor(rng()*c.length)]; this.star=rng()>.7; } constructor(i){ this.reset(i); } draw(){ const p=this.life/this.max, a=p<.15?p/.15:p>.75?(1-p)/.25:1; ctx.globalAlpha=a*(this.star?.7:.35); ctx.fillStyle=this.col+(this.star?'1)':'.6)'); if(this.star)star4(this.x,this.y,this.r*2.2); else{ ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); } } update(){ this.x+=this.vx*pMul; this.y+=this.vy*pMul; this.life++; if(this.life>this.max||this.y<-20)this.reset(); } }
function star4(px,py,r){ const ir=r*.35; ctx.beginPath(); for(let i=0;i<8;i++){ const a=i*Math.PI/4,rr=i%2?ir:r; i?ctx.lineTo(px+rr*Math.cos(a),py+rr*Math.sin(a)):ctx.moveTo(px+rr*Math.cos(a),py+rr*Math.sin(a)); } ctx.closePath(); ctx.fill(); }
const PP = Array.from({length:110},()=>new P(true));
function resetPP(){ PP.forEach(p=>p.reset(true)); pMul=1; burst=false; }

const eO3 = t=>1-Math.pow(1-t,3);
const eBack = t=>{ const c=2.70158; return 1+c*Math.pow(t-1,3)+(c-1)*Math.pow(t-1,2); };
function pr(t,from,dur){ return Math.max(0,Math.min(1,eO3((t-from)/dur))); }
function txt(s,x,y,f,c,a=1){ if(a<=0)return; ctx.save(); ctx.globalAlpha=Math.min(1,a); ctx.font=f; ctx.fillStyle=c; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText(s,x,y); ctx.restore(); }
function gtxt(s,x,y,f,stops,a=1){ if(a<=0)return; ctx.save(); ctx.font=f; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; const w=ctx.measureText(s).width; const g=ctx.createLinearGradient(x-w/2,0,x+w/2,0); stops.forEach(([p,c])=>g.addColorStop(p,c)); ctx.globalAlpha=Math.min(1,a); ctx.fillStyle=g; ctx.fillText(s,x,y); ctx.restore(); }
function ch(s,a){ txt(s,CW/2,CH*.285,`700 ${CW*.0085}px Inter`,'rgba(150,200,255,1)',a*.38); }
function sub(s,y,a){ txt(s,CW/2,y,`300 ${CW*.013}px Inter`,'rgba(180,210,255,1)',a*.68); }
function dline(p,y){ if(p<=0)return; const w=CW*.08*p; ctx.save(); ctx.globalAlpha=.18; ctx.fillStyle='rgba(100,160,255,1)'; ctx.fillRect(CW/2-w,y,w*2,1.5); ctx.restore(); }
function stat(num,lbl,cx,a){ txt(num,cx,CH*.595,`600 ${CW*.033}px Fredoka`,num==='AI'?'#60A5FA':'#F97316',a); txt(lbl,cx,CH*.64,`600 ${CW*.008}px Inter`,'rgba(150,200,255,.7)',a*.7); }
function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }
const SC='ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*!?';
function scramble(final,p){ return [...final].map((c,i)=>{ if(c===' ')return ' '; const cp=Math.max(0,(p-(i/final.length)*.6)*2.5); return cp>=1?c:SC[Math.floor(Math.random()*SC.length)]; }).join(''); }
function typer(s,t,start,speed){ return s.slice(0,Math.max(0,Math.floor((t-start)/speed))); }

function draw(t){
  const sky=ctx.createRadialGradient(CW*.5,CH*.4,0,CW*.5,CH*.5,CW*.72);
  if(t<8){ sky.addColorStop(0,'#071E3D');sky.addColorStop(1,'#020C1E'); }
  else if(t<15){ sky.addColorStop(0,'#061830');sky.addColorStop(1,'#010A18'); }
  else if(t<20){ sky.addColorStop(0,'#120640');sky.addColorStop(1,'#040114'); }
  else if(t<32){ sky.addColorStop(0,'#0A1E40');sky.addColorStop(1,'#020B1C'); }
  else if(t<37){ sky.addColorStop(0,'#0C0840');sky.addColorStop(1,'#040118'); }
  else { sky.addColorStop(0,'#071E3D');sky.addColorStop(1,'#020C1E'); }
  ctx.fillStyle=sky; ctx.fillRect(0,0,CW,CH);

  [[.18,.28,.35,'rgba(30,80,160,.13)'],[.82,.72,.28,'rgba(90,20,160,.1)']].forEach(([nx,ny,nr,nc])=>{ const n=ctx.createRadialGradient(CW*nx,CH*ny,0,CW*nx,CH*ny,CW*nr); n.addColorStop(0,nc); n.addColorStop(1,'transparent'); ctx.fillStyle=n; ctx.fillRect(0,0,CW,CH); });
  STARS.forEach(s=>{ const a=s.base+Math.sin(t*.8*s.spd+s.ph)*(s.big?.32:.12); ctx.globalAlpha=Math.max(0,Math.min(.95,a)); if(s.big){ ctx.shadowColor='rgba(150,200,255,.7)'; ctx.shadowBlur=8; } ctx.fillStyle=s.big?'#fff':'rgba(200,230,255,.85)'; ctx.beginPath(); ctx.arc(s.x*CW,s.y*CH,s.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; });
  ctx.globalAlpha=1;
  PP.forEach(p=>{ p.update(); p.draw(); }); ctx.globalAlpha=1;
  const vig=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,CW*.62); vig.addColorStop(.38,'transparent'); vig.addColorStop(1,'rgba(0,5,20,.78)'); ctx.fillStyle=vig; ctx.fillRect(0,0,CW,CH);

  if(t>=1&&t<8){ const p1=pr(t,1,.9),p2=pr(t,2,1),p3=pr(t,3.2,1),p4=pr(t,4.2,1.2); ch('A QUESTION FOR EVERY PARENT & TEACHER',p1); txt('Why do some children',CW/2,CH*.43,`800 ${CW*.046}px Inter`,'#fff',p2); gtxt('shine…',CW/2,CH*.545,`800 ${CW*.048}px Inter`,[[0,'#F97316'],[.5,'#F43F88'],[1,'#9333EA']],p3); sub('…while millions stay silent in the classroom?',CH*.65,p4); }
  if(t>=8&&t<15){ const p1=pr(t,8,.8),p2=pr(t,9,1.2),p3=pr(t,10.5,1),p4=pr(t,12,1.2); ch('THE REALITY — ASER REPORT 2023, INDIA',p1); txt('1 in 2',CW/2,CH*.47,`600 ${CW*.075}px Fredoka`,'#F97316',p2); txt('school children cannot read or speak with confidence',CW/2,CH*.565,`700 ${CW*.022}px Inter`,'rgba(255,255,255,.85)',p3); dline(pr(t,11,.8),CH*.615); sub('Even after years of school — even the bright ones hold back.',CH*.675,p4); }
  if(t>=15&&t<20){ const p1=pr(t,15,.6),p2=pr(t,16.5,.8); const sc1=Math.min(1,(t-15.3)/1.2),sc2=Math.min(1,(t-16.8)/1.4); if(p1>0)gtxt(sc1>0?scramble('WHAT IF',sc1):'',CW/2,CH*.455,`900 ${CW*.082}px Inter`,[[0,'#F97316'],[.5,'#F43F88'],[1,'#9333EA']],p1); if(p2>0)txt(sc2>0?scramble('AI COULD?',sc2):'',CW/2,CH*.575,`900 ${CW*.076}px Inter`,'rgba(255,255,255,.92)',p2); }
  if(t>=20&&t<26){ const p1=pr(t,20,.7),p2=pr(t,21,1),p3=pr(t,22.5,1.2),p4=pr(t,23.8,1); ch('ADAPTIVE READING',p1); txt('A coach that knows',CW/2,CH*.415,`800 ${CW*.046}px Inter`,'#fff',p2); txt('where every child struggles.',CW/2,CH*.525,`800 ${CW*.046}px Inter`,'#F97316',p3); sub('Level-adaptive passages · Real-time accuracy · Instant feedback',CH*.645,p4); }
  if(t>=26&&t<32){ const p1=pr(t,26,.7),p2=pr(t,27,1),p3=pr(t,28.2,1.2),p4=pr(t,29.5,1); ch('AI SPEAKING COACH',p1); txt('An AI that',CW/2,CH*.415,`800 ${CW*.046}px Inter`,'#fff',p2); txt('listens, scores & coaches.',CW/2,CH*.525,`800 ${CW*.046}px Inter`,'#9333EA',p3); sub('Every word. Every pause. Every improvement — captured live.',CH*.645,p4); }
  if(t>=32&&t<37){ const p0=pr(t,32,.5),a2=Math.min(1,Math.max(0,(t-34.1)*2)); ch('FOR SCHOOLS & FAMILIES · INDIA & BEYOND',p0); const l1=typer('For every school.',t,32.4,.075); const l2=typer('For every home.',t,34.2,.08); const cur1=t<34.15&&t>=32.4?'|':'', cur2=t<35.4&&t>=34.2?'|':''; txt(l1+cur1,CW/2,CH*.415,`800 ${CW*.048}px Inter`,'#fff',p0); txt(l2+cur2,CW/2,CH*.53,`800 ${CW*.048}px Inter`,'#F97316',a2); stat('I–X','All Grades',CW*.3,pr(t,35,.8)); stat('AI','Adaptive',CW*.5,pr(t,35.4,.8)); stat('5','Wizard Badges',CW*.7,pr(t,35.8,.8)); }
  if(t>=37&&t<42){ if(t>=37&&t<37.06){ burst=true; pMul=5; PP.forEach(p=>p.reset(false)); } if(t>=38){ burst=false; if(pMul>1)pMul=Math.max(1,pMul*.96); } const p1=pr(t,37,.5),p2=pr(t,37.3,1.2),p3=pr(t,38.5,1); const pc=[pr(t,39.5,.6),pr(t,39.8,.6),pr(t,40.1,.6),pr(t,40.4,.6)]; txt('INTRODUCING',CW/2,CH*.295,`700 ${CW*.009}px Inter`,'rgba(150,200,255,.35)',p1); if(LOGO&&p2>0){ const lw=CW*.32,lh=lw*(LOGO.naturalHeight/LOGO.naturalWidth); const sc=.5+eBack(Math.min(1,p2))*.5; ctx.save(); ctx.globalAlpha=Math.min(1,p2); ctx.shadowColor='rgba(147,51,234,.85)'; ctx.shadowBlur=80; ctx.translate(CW/2,CH*.465); ctx.scale(sc,sc); ctx.drawImage(LOGO,-lw/2,-lh/2,lw,lh); ctx.restore(); } gtxt('Read Smart. Speak Bold.',CW/2,CH*.615,`600 ${CW*.038}px Fredoka`,[[0,'#fff'],[.45,'#bfdbfe'],[1,'#fbbf24']],p3); const chips=['📖 Adaptive Reading','🎤 AI Speaking Coach','🏆 Badges & Certs','📊 Teacher Dashboard']; const cW=CW*.172,cH=CW*.032,cY=CH*.675,tot=chips.length*cW+(chips.length-1)*14; chips.forEach((c,i)=>{ if(pc[i]<=0)return; const cx=CW/2-tot/2+i*(cW+14)+cW/2; ctx.save(); ctx.globalAlpha=pc[i]*.75; ctx.fillStyle='rgba(255,255,255,.07)'; ctx.strokeStyle='rgba(150,200,255,.18)'; ctx.lineWidth=1.5; rrect(cx-cW/2,cY,cW,cH,cH/2); ctx.fill(); ctx.stroke(); ctx.globalAlpha=pc[i]*.72; ctx.font=`500 ${CW*.0095}px Inter`; ctx.fillStyle='rgba(200,230,255,.85)'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(c,cx,cY+cH/2); ctx.restore(); }); }
  if(t>=42){ const p1=pr(t,42,.6),p2=pr(t,42.3,1),p3=pr(t,43.2,.8),p4=pr(t,43.8,1); if(p1>0){ const pill='★  Schools & Families · India & Beyond'; ctx.font=`600 ${CW*.012}px Inter`; const pw=ctx.measureText(pill).width+CW*.04,ph=CW*.025; const px=CW/2-pw/2,py=CH*.275-ph/2; ctx.save(); ctx.globalAlpha=p1*.68; ctx.fillStyle='rgba(249,115,22,.15)'; ctx.strokeStyle='rgba(96,165,250,.28)'; ctx.lineWidth=1.5; rrect(px,py,pw,ph,ph/2); ctx.fill(); ctx.stroke(); ctx.globalAlpha=p1*.8; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='rgba(200,230,255,.85)'; ctx.fillText(pill,CW/2,py+ph/2); ctx.restore(); } gtxt('July 2026',CW/2,CH*.515,`600 ${CW*.072}px Fredoka`,[[0,'#F97316'],[.5,'#F43F88'],[1,'#9333EA']],p2); txt('wizlingo  ·  Grades I–X  ·  English',CW/2,CH*.59,`400 ${CW*.013}px Inter`,'rgba(150,200,255,.38)',p3); if(p4>0&&LOGO&&EDV){ const lw=CW*.155,lh=lw*(LOGO.naturalHeight/LOGO.naturalWidth); const ew=CW*.088,eh=ew*(EDV.naturalHeight/EDV.naturalWidth); const gap=CW*.024,rowY=CH*.72; const totW=lw+gap+1+gap+ew; const sx=CW/2-totW/2; ctx.globalAlpha=p4; ctx.drawImage(LOGO,sx,rowY-lh/2,lw,lh); ctx.globalAlpha=p4*.38; ctx.fillStyle='rgba(150,200,255,.5)'; ctx.fillRect(sx+lw+gap,rowY-CW*.022,1,CW*.044); const eX=sx+lw+gap*2,eY=rowY-CH*.04,ePW=ew+CW*.022,ePH=CH*.078; ctx.globalAlpha=p4; ctx.fillStyle='#fff'; rrect(eX,eY,ePW,ePH,8); ctx.fill(); ctx.drawImage(EDV,eX+CW*.011,rowY-eh/2,ew,eh); ctx.globalAlpha=p4*.32; ctx.font=`600 ${CW*.007}px Inter`; ctx.fillStyle='rgba(150,200,255,1)'; ctx.textAlign='left'; ctx.textBaseline='bottom'; ctx.fillText('AN INITIATIVE BY',eX,eY-4); ctx.globalAlpha=1; } }

  ctx.globalAlpha=1; ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH*.096); ctx.fillRect(0,CH*.904,CW,CH*.096);
  if(t>=37&&t<37.55){ const fa=Math.max(0,.88-(t-37)*3.8); ctx.globalAlpha=fa; ctx.fillStyle='#fff'; ctx.fillRect(0,0,CW,CH); ctx.globalAlpha=1; }
}

let t0=null, raf=null;
function startPreview(){ if(raf)cancelAnimationFrame(raf); resetPP(); t0=null; disableBtns(); setStatus('Previewing…'); function loop(ts){ if(!t0)t0=ts; const el=Math.min((ts-t0)/1000,TOTAL+.1); draw(el); setProg(el/TOTAL); if(el<=TOTAL)raf=requestAnimationFrame(loop); else{ enableBtns(); setStatus('Done — Generate Video.'); } } raf=requestAnimationFrame(loop); }

async function generateVideo(){
  if(!LOGO){ setStatus('⚠ Wait for assets.'); return; }
  disableBtns(); setStatus('<span class="dot"></span>Capturing…');
  try {
    const stream = canvas.captureStream(FPS);
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12_000_000 });
    const chunks = [];
    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'wiziingo-teaser-hd.webm'; a.click();
      URL.revokeObjectURL(url);
      setStatus(`✓ Downloaded (${Math.round(blob.size/1024/1024)}MB)`);
      setProg(1); enableBtns();
    };
    recorder.start(250);
    resetPP(); t0 = null;
    const TOTAL_FRAMES = Math.ceil(TOTAL * FPS);
    let frame = 0;
    function renderFrame(){
      const t = frame / FPS;
      draw(t); setProg(frame / TOTAL_FRAMES);
      if(frame % 6 === 0) setStatus(`<span class="dot"></span>Frame ${frame}/${TOTAL_FRAMES}`);
      frame++;
      if(frame <= TOTAL_FRAMES) requestAnimationFrame(renderFrame);
      else setTimeout(() => recorder.stop(), 300);
    }
    renderFrame();
  } catch(e){ setStatus(`⚠ ${e.message}`); enableBtns(); }
}

function setStatus(h){ document.getElementById('status').innerHTML=h; }
function setProg(p){ document.getElementById('pbar').style.width=(Math.min(1,p)*100)+'%'; }
function disableBtns(){ document.getElementById('btnPrev').disabled=true; document.getElementById('btnGen').disabled=true; }
function enableBtns(){ document.getElementById('btnPrev').disabled=false; document.getElementById('btnGen').disabled=false; }

draw(0);
</script>
</body>
</html>
