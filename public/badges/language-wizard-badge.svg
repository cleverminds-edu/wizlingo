<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="langBg3D" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#6EE7B7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </radialGradient>

    <radialGradient id="langInner3D" cx="40%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#D1FAE5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6EE7B7;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="langShine" cx="40%" cy="30%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="langRing" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </radialGradient>

    <filter id="shadowDeep3D4">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="2" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="innerShadow3D4">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="langShineBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <circle cx="140" cy="152" r="135" fill="#000000" opacity="0.3"/>
  <circle cx="140" cy="148" r="133" fill="#000000" opacity="0.15"/>

  <circle cx="140" cy="140" r="130" fill="url(#langBg3D)" filter="url(#shadowDeep3D4)"/>
  <circle cx="140" cy="140" r="128" fill="url(#langRing)"/>
  <circle cx="140" cy="140" r="125" fill="url(#langInner3D)"/>
  <circle cx="140" cy="130" r="100" fill="url(#langShine)" opacity="0.5"/>

  <circle cx="140" cy="140" r="130" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4"/>
  <circle cx="140" cy="140" r="131" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <circle cx="140" cy="140" r="128" fill="none" stroke="#059669" stroke-width="2" opacity="0.5"/>

  <!-- 3D WIZARD HAT -->
  <g transform="translate(140, 100)" filter="url(#innerShadow3D4)">
    <!-- Hat shadow -->
    <path d="M -30,-44 L 0,-72 L 30,-44 Z" fill="#000000" opacity="0.25" transform="translate(2, 2)"/>

    <!-- Hat cone - 3D -->
    <path d="M -34,-42 L 0,-72 L 34,-42 Z" fill="#10B981" stroke="#6EE7B7" stroke-width="4" opacity="0.95"/>
    <!-- Cone highlight -->
    <path d="M -16,-38 L 0,-64 L 16,-38 Z" fill="#FFFFFF" opacity="0.2"/>

    <!-- Hat brim -->
    <ellipse cx="0" cy="-40" rx="40" ry="15" fill="#34D399" stroke="#6EE7B7" stroke-width="3.5" opacity="0.95"/>
    <ellipse cx="0" cy="-40" rx="38" ry="13" fill="#6EE7B7" opacity="0.25"/>
    <ellipse cx="0" cy="-42" rx="36" ry="6" fill="#FFFFFF" opacity="0.15"/>

    <!-- Gold star - 3D positioned -->
    <path d="M 0,-72 L 6,-55 L 23,-53 L 11,-42 L 17,-25 L 0,-32 L -17,-25 L -11,-42 L -23,-53 L -6,-55 Z"
          fill="#FFD700" stroke="#FFC700" stroke-width="1.5" opacity="0.98"/>
    <circle cx="0" cy="-63" r="3" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="0" cy="-62" r="1.5" fill="#FFFACD" opacity="0.6"/>
  </g>

  <!-- Sparkles -->
  <g filter="url(#innerShadow3D4)" opacity="0.95">
    <g transform="translate(242, 80)">
      <path d="M 0,-10 L 3,-2 L 12,-1 L 5,4 L 7,13 L 0,8 L -7,13 L -5,4 L -12,-1 L -3,-2 Z" fill="#6EE7B7" opacity="0.9"/>
      <circle cx="0" cy="-6" r="1.5" fill="#FFFFFF" opacity="0.8"/>
    </g>
    <g transform="translate(48, 105)">
      <path d="M 0,-8 L 2,-1 L 10,0 L 4,5 L 5,11 L 0,7 L -5,11 L -4,5 L -10,0 L -2,-1 Z" fill="#6EE7B7" opacity="0.7"/>
    </g>
  </g>

  <ellipse cx="140" cy="238" rx="92" ry="14" fill="url(#langShineBar)"/>

  <text x="140" y="237" font-family="Fredoka, Arial" font-size="23" font-weight="900" text-anchor="middle"
        fill="url(#langBg3D)" letter-spacing="0.5" stroke="#059669" stroke-width="1.5" opacity="0.95">LANGUAGE WIZARD</text>
  <text x="140" y="237" font-family="Fredoka, Arial" font-size="23" font-weight="900" text-anchor="middle"
        fill="#FFFFFF" letter-spacing="0.5" opacity="0.6" stroke="none">LANGUAGE WIZARD</text>
</svg>
