<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="langShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5E7B1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <filter id="langShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#langShadow)">
    <!-- Hexagon border with double ring for elevation -->
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#7C3AED" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.6" stroke-linejoin="round"/>

    <!-- Shield -->
    <path d="M 90 90 L 190 90 L 190 160 Q 190 180 140 205 Q 90 180 90 160 Z" fill="url(#langShield)"/>

    <!-- Professional globe icon -->
    <circle cx="140" cy="120" r="20" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <ellipse cx="140" cy="120" rx="20" ry="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <path d="M 120 120 Q 140 115 160 120" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <path d="M 120 120 Q 140 125 160 120" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <!-- Vertical lines -->
    <line x1="140" y1="100" x2="140" y2="140" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="125" y1="115" x2="155" y2="125" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>

    <!-- Gold star accent -->
    <g transform="translate(140, 45)">
      <polygon points="0,-7 2.5,-2 8,-2 3.5,2 5.5,7 0,3.5 -5.5,7 -3.5,2 -8,-2 -2.5,-2" fill="#FFD700" opacity="0.95"/>
    </g>

    <!-- Badge text -->
    <text x="140" y="157" font-family="Fredoka, Arial" font-size="12" font-weight="900" text-anchor="middle" fill="#5B21B6" opacity="0.3">LANGUAGE</text>
    <text x="140" y="172" font-family="Fredoka, Arial" font-size="12" font-weight="900" text-anchor="middle" fill="#5B21B6" opacity="0.3">WIZARD</text>

    <text x="140" y="155" font-family="Fredoka, Arial" font-size="12" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.95">LANGUAGE</text>
    <text x="140" y="170" font-family="Fredoka, Arial" font-size="12" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.95">WIZARD</text>
  </g>
</svg>
