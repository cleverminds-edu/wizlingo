<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="grandShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <filter id="grandShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#grandShadow)">
    <!-- Triple hexagon rings - premium look -->
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#FFD700" stroke-width="5" stroke-linejoin="round"/>
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#F97316" stroke-width="2" opacity="0.8" stroke-linejoin="round"/>
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#9333EA" stroke-width="1" opacity="0.6" stroke-linejoin="round"/>

    <!-- Shield -->
    <path d="M 90 90 L 190 90 L 190 160 Q 190 180 140 205 Q 90 180 90 160 Z" fill="url(#grandShield)"/>

    <!-- Professional crown - elegant, not toy-like -->
    <!-- Crown band -->
    <rect x="120" y="95" width="40" height="12" fill="#FFFFFF" opacity="0.95" stroke="#FFD700" stroke-width="1.5" rx="1"/>
    <!-- Crown points - clean triangles -->
    <polygon points="135,95 130,70 142,95" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="148,95 140,65 156,95" fill="#FFFFFF" opacity="0.95"/>
    <polygon points="161,95 158,70 170,95" fill="#FFFFFF" opacity="0.9"/>

    <!-- Decorative vertical lines (classic crown pattern) -->
    <line x1="125" y1="107" x2="125" y2="115" stroke="#FFD700" stroke-width="1.5" opacity="0.7"/>
    <line x1="155" y1="107" x2="155" y2="115" stroke="#FFD700" stroke-width="1.5" opacity="0.7"/>

    <!-- Gold star accent at apex -->
    <g transform="translate(140, 40)">
      <polygon points="0,-8 3,-2 10,-2 4,3 6,9 0,5 -6,9 -4,3 -10,-2 -3,-2" fill="#FFD700" opacity="0.95"/>
    </g>

    <!-- Badge text -->
    <text x="140" y="167" font-family="Fredoka, Arial" font-size="12" font-weight="900" text-anchor="middle" fill="#D97706" opacity="0.3">GRAND WIZARD</text>
    <text x="140" y="165" font-family="Fredoka, Arial" font-size="12" font-weight="900" text-anchor="middle" fill="#FFD700" opacity="0.95">GRAND WIZARD</text>
  </g>
</svg>
