<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="wordBg3D" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#7DD3FC;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0284C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#075985;stop-opacity:1" />
    </radialGradient>

    <radialGradient id="wordInner3D" cx="40%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#E0F2FE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7DD3FC;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="wordShine" cx="40%" cy="30%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="wordRing" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </radialGradient>

    <filter id="shadowDeep3D2">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="2" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="innerShadow3D2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="wordShineBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <circle cx="140" cy="152" r="135" fill="#000000" opacity="0.3"/>
  <circle cx="140" cy="148" r="133" fill="#000000" opacity="0.15"/>

  <circle cx="140" cy="140" r="130" fill="url(#wordBg3D)" filter="url(#shadowDeep3D2)"/>
  <circle cx="140" cy="140" r="128" fill="url(#wordRing)"/>
  <circle cx="140" cy="140" r="125" fill="url(#wordInner3D)"/>
  <circle cx="140" cy="130" r="100" fill="url(#wordShine)" opacity="0.5"/>

  <circle cx="140" cy="140" r="130" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4"/>
  <circle cx="140" cy="140" r="131" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <circle cx="140" cy="140" r="128" fill="none" stroke="#0284C7" stroke-width="2" opacity="0.5"/>

  <!-- 3D BOOK ICON -->
  <g transform="translate(140, 112)" filter="url(#innerShadow3D2)">
    <!-- Shadow -->
    <path d="M -33,-22 L -6,-20 L -6,28 L -33,32 Z" fill="#000000" opacity="0.25" transform="translate(3, 3)"/>

    <!-- Left page -->
    <path d="M -33,-20 L -6,-18 L -6,26 L -33,30 Z" fill="#60A5FA" stroke="#FFFFFF" stroke-width="3" opacity="0.95"/>
    <!-- Left page highlight -->
    <path d="M -30,-16 L -10,-14 L -10,10 L -30,12 Z" fill="#FFFFFF" opacity="0.15"/>

    <!-- Right page -->
    <path d="M 6,-18 L 33,-20 L 33,30 L 8,26 Z" fill="#38BDF8" stroke="#FFFFFF" stroke-width="3" opacity="0.95"/>
    <!-- Right page highlight -->
    <path d="M 10,-14 L 30,-16 L 30,12 L 12,10 Z" fill="#FFFFFF" opacity="0.1"/>

    <!-- Book spine -->
    <rect x="-3" y="-20" width="6" height="52" fill="#0284C7" opacity="0.8"/>
    <rect x="-2" y="-20" width="4" height="52" fill="#FFFFFF" opacity="0.1"/>

    <!-- Text lines - bold 3D -->
    <line x1="-26" y1="-6" x2="-10" y2="-6" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="-26" y1="6" x2="-14" y2="6" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="-26" y1="16" x2="-10" y2="16" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.65"/>

    <!-- Right text -->
    <line x1="10" y1="-6" x2="28" y2="-6" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="10" y1="6" x2="26" y2="6" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="10" y1="16" x2="28" y2="16" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- Sparkles -->
  <g filter="url(#innerShadow3D2)" opacity="0.95">
    <g transform="translate(228, 75)">
      <path d="M 0,-10 L 3,-2 L 12,-1 L 5,4 L 7,13 L 0,8 L -7,13 L -5,4 L -12,-1 L -3,-2 Z" fill="#7DD3FC" opacity="0.9"/>
      <circle cx="0" cy="-6" r="1.5" fill="#FFFFFF" opacity="0.8"/>
    </g>
    <g transform="translate(55, 95)">
      <path d="M 0,-8 L 2,-1 L 10,0 L 4,5 L 5,11 L 0,7 L -5,11 L -4,5 L -10,0 L -2,-1 Z" fill="#7DD3FC" opacity="0.7"/>
    </g>
  </g>

  <ellipse cx="140" cy="238" rx="92" ry="14" fill="url(#wordShineBar)"/>

  <text x="140" y="237" font-family="Fredoka, Arial" font-size="27" font-weight="900" text-anchor="middle"
        fill="url(#wordBg3D)" letter-spacing="1" stroke="#0284C7" stroke-width="1.5" opacity="0.95">WORD WIZARD</text>
  <text x="140" y="237" font-family="Fredoka, Arial" font-size="27" font-weight="900" text-anchor="middle"
        fill="#FFFFFF" letter-spacing="1" opacity="0.6" stroke="none">WORD WIZARD</text>
</svg>
