<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="wordShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <filter id="wordShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#wordShadow)">
    <!-- Hexagon border -->
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#7C3AED" stroke-width="3" stroke-linejoin="round"/>
    <!-- Shield -->
    <path d="M 90 90 L 190 90 L 190 160 Q 190 180 140 205 Q 90 180 90 160 Z" fill="url(#wordShield)"/>

    <!-- Professional book icon - more angular -->
    <rect x="118" y="95" width="44" height="55" fill="none" stroke="#FFFFFF" stroke-width="2.5" rx="1"/>
    <line x1="140" y1="95" x2="140" y2="150" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <line x1="125" y1="110" x2="155" y2="110" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="125" y1="125" x2="155" y2="125" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="125" y1="140" x2="155" y2="140" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>

    <!-- Gold star accent -->
    <g transform="translate(140, 45)">
      <polygon points="0,-7 2.5,-2 8,-2 3.5,2 5.5,7 0,3.5 -5.5,7 -3.5,2 -8,-2 -2.5,-2" fill="#FFD700" opacity="0.95"/>
    </g>

    <!-- Badge text -->
    <text x="140" y="167" font-family="Fredoka, Arial" font-size="13" font-weight="900" text-anchor="middle" fill="#6D28D9" opacity="0.3">WORD WIZARD</text>
    <text x="140" y="165" font-family="Fredoka, Arial" font-size="13" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.95">WORD WIZARD</text>
  </g>
</svg>
