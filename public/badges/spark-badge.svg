<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="sparkShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <filter id="sparkShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#sparkShadow)">
    <!-- Hexagon border -->
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#FFB800" stroke-width="3" stroke-linejoin="round"/>
    <!-- Shield -->
    <path d="M 90 90 L 190 90 L 190 160 Q 190 180 140 205 Q 90 180 90 160 Z" fill="url(#sparkShield)"/>

    <!-- Professional flame icon - angular, clean -->
    <path d="M 140 130 L 130 100 L 135 95 Q 140 70 140 55 Q 140 70 145 95 L 150 100 Z" fill="#FFFFFF" opacity="0.95" stroke="#FFD700" stroke-width="1.5"/>
    <path d="M 140 115 L 135 105 Q 135 100 140 95 Q 145 100 145 105 Z" fill="#FFD700" opacity="0.8"/>

    <!-- Gold star accent -->
    <g transform="translate(140, 45)">
      <polygon points="0,-7 2.5,-2 8,-2 3.5,2 5.5,7 0,3.5 -5.5,7 -3.5,2 -8,-2 -2.5,-2" fill="#FFD700" opacity="0.95"/>
    </g>

    <!-- Badge text -->
    <text x="140" y="167" font-family="Fredoka, Arial" font-size="18" font-weight="900" text-anchor="middle" fill="#C2410C" opacity="0.3">SPARK</text>
    <text x="140" y="165" font-family="Fredoka, Arial" font-size="18" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.95">SPARK</text>
  </g>
</svg>
