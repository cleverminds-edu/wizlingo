<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="voiceShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8A2D5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F43F88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
    <filter id="voiceShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#voiceShadow)">
    <!-- Hexagon border -->
    <polygon points="140,30 235,75 235,205 140,250 45,205 45,75"
             fill="none" stroke="#F43F88" stroke-width="3" stroke-linejoin="round"/>
    <!-- Shield -->
    <path d="M 90 90 L 190 90 L 190 160 Q 190 180 140 205 Q 90 180 90 160 Z" fill="url(#voiceShield)"/>

    <!-- Professional microphone icon - clean and angular -->
    <rect x="130" y="95" width="20" height="32" fill="none" stroke="#FFFFFF" stroke-width="2.5" rx="2"/>
    <rect x="128" y="127" width="24" height="8" fill="none" stroke="#FFFFFF" stroke-width="2.5" rx="1"/>
    <path d="M 120 135 Q 140 145 160 135" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
    <path d="M 115 130 Q 140 150 165 130" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>

    <!-- Gold star accent -->
    <g transform="translate(140, 45)">
      <polygon points="0,-7 2.5,-2 8,-2 3.5,2 5.5,7 0,3.5 -5.5,7 -3.5,2 -8,-2 -2.5,-2" fill="#FFD700" opacity="0.95"/>
    </g>

    <!-- Badge text -->
    <text x="140" y="167" font-family="Fredoka, Arial" font-size="13" font-weight="900" text-anchor="middle" fill="#DB2777" opacity="0.3">VOICE WIZARD</text>
    <text x="140" y="165" font-family="Fredoka, Arial" font-size="13" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.95">VOICE WIZARD</text>
  </g>
</svg>
