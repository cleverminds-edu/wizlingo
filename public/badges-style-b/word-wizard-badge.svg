<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <filter id="wordMinShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Clean background circle -->
  <circle cx="140" cy="140" r="125" fill="#9333EA" filter="url(#wordMinShadow)"/>

  <!-- Accent ring -->
  <circle cx="140" cy="140" r="125" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>

  <!-- Minimalist book icon (centered, bold) -->
  <!-- Left page -->
  <path d="M 110 105 L 130 105 L 130 165 Q 125 170 120 165 L 110 165 Z"
        fill="#FFFFFF" opacity="0.9"/>

  <!-- Right page -->
  <path d="M 150 105 L 170 105 L 170 165 L 150 165 Q 145 170 150 165 Z"
        fill="#C084FC" opacity="0.8"/>

  <!-- Book spine line -->
  <line x1="130" y1="105" x2="130" y2="165" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>

  <!-- Text lines on pages (minimal) -->
  <line x1="117" y1="125" x2="127" y2="125" stroke="#9333EA" stroke-width="1.5" opacity="0.5"/>
  <line x1="117" y1="140" x2="127" y2="140" stroke="#9333EA" stroke-width="1.5" opacity="0.5"/>
  <line x1="117" y1="155" x2="125" y2="155" stroke="#9333EA" stroke-width="1.5" opacity="0.5"/>

  <line x1="155" y1="125" x2="165" y2="125" stroke="#6D28D9" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="140" x2="165" y2="140" stroke="#6D28D9" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="155" x2="163" y2="155" stroke="#6D28D9" stroke-width="1.5" opacity="0.5"/>

  <!-- Badge label -->
  <text x="140" y="220" font-family="Fredoka, Arial" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">WORD WIZARD</text>

  <!-- Subtle outer ring -->
  <circle cx="140" cy="140" r="130" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
</svg>
