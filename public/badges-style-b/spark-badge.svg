<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <filter id="sparkMinShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Clean background circle -->
  <circle cx="140" cy="140" r="125" fill="#F97316" filter="url(#sparkMinShadow)"/>

  <!-- Accent color ring -->
  <circle cx="140" cy="140" r="125" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>

  <!-- Minimalist flame icon (centered, bold) -->
  <!-- Flame shape (simplified geometric) -->
  <path d="M 140 90 L 155 125 L 148 125 L 158 160 L 140 140 L 122 160 L 132 125 L 125 125 Z"
        fill="#FFFFFF" opacity="0.95"/>

  <!-- Inner accent -->
  <path d="M 140 100 L 150 120 L 145 120 L 152 145 L 140 130 L 128 145 L 135 120 L 130 120 Z"
        fill="#FFD700" opacity="0.7"/>

  <!-- Badge label -->
  <text x="140" y="220" font-family="Fredoka, Arial" font-size="20" font-weight="700" text-anchor="middle" fill="#FFFFFF">SPARK</text>

  <!-- Subtle corner accent -->
  <circle cx="140" cy="140" r="130" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
</svg>
