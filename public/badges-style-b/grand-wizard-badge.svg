<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <filter id="grandMinShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15" />
    </filter>
    <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rainbow background gradient -->
  <circle cx="140" cy="140" r="125" fill="url(#rainbowGrad)" filter="url(#grandMinShadow)"/>

  <!-- Accent ring (bright) -->
  <circle cx="140" cy="140" r="125" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>

  <!-- Crown icon (minimalist, bold) -->
  <!-- Crown base band -->
  <path d="M 110 165 L 115 135 L 130 125 L 140 115 L 150 125 L 165 135 L 170 165 Z"
        fill="#FFFFFF" opacity="0.95"/>

  <!-- Crown points (simplified triangles) -->
  <!-- Center point -->
  <path d="M 138 110 L 140 95 L 142 110" fill="#FFD700" opacity="0.9"/>

  <!-- Left point -->
  <path d="M 120 125 L 115 110 L 125 125" fill="#FFD700" opacity="0.85"/>

  <!-- Right point -->
  <path d="M 160 125 L 165 110 L 155 125" fill="#FFD700" opacity="0.85"/>

  <!-- Jewel accents in crown -->
  <!-- Center jewel -->
  <circle cx="140" cy="140" r="6" fill="#FFD700" opacity="0.95"/>
  <circle cx="140" cy="140" r="4" fill="#FCD34D" opacity="0.8"/>

  <!-- Left jewel -->
  <circle cx="125" cy="145" r="4" fill="#EC4899" opacity="0.8"/>

  <!-- Right jewel -->
  <circle cx="155" cy="145" r="4" fill="#3B82F6" opacity="0.8"/>

  <!-- Decorative base line -->
  <line x1="110" y1="165" x2="170" y2="165" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>

  <!-- Badge label -->
  <text x="140" y="220" font-family="Fredoka, Arial" font-size="20" font-weight="700" text-anchor="middle" fill="#FFFFFF">GRAND WIZARD</text>

  <!-- Subtle outer ring -->
  <circle cx="140" cy="140" r="130" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
</svg>
