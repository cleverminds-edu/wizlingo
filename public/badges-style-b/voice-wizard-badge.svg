<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <filter id="voiceMinShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Clean background circle -->
  <circle cx="140" cy="140" r="125" fill="#F43F88" filter="url(#voiceMinShadow)"/>

  <!-- Accent ring -->
  <circle cx="140" cy="140" r="125" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>

  <!-- Minimalist microphone icon (centered, bold) -->
  <!-- Microphone head (rounded rectangle) -->
  <rect x="115" y="100" width="50" height="60" rx="12" fill="#FFFFFF" opacity="0.95"/>

  <!-- Microphone grid lines -->
  <line x1="125" y1="110" x2="155" y2="110" stroke="#F43F88" stroke-width="1.5" opacity="0.6"/>
  <line x1="125" y1="125" x2="155" y2="125" stroke="#F43F88" stroke-width="1.5" opacity="0.6"/>
  <line x1="125" y1="140" x2="155" y2="140" stroke="#F43F88" stroke-width="1.5" opacity="0.6"/>
  <line x1="125" y1="155" x2="155" y2="155" stroke="#F43F88" stroke-width="1.5" opacity="0.6"/>

  <!-- Microphone stand -->
  <rect x="135" y="160" width="10" height="35" rx="5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Stand base -->
  <ellipse cx="140" cy="200" rx="20" ry="8" fill="#F472B6" opacity="0.8"/>

  <!-- Sound wave indicator -->
  <path d="M 155 120 Q 165 130 165 140 Q 165 150 155 160"
        fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

  <!-- Badge label -->
  <text x="140" y="220" font-family="Fredoka, Arial" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">VOICE WIZARD</text>

  <!-- Subtle outer ring -->
  <circle cx="140" cy="140" r="130" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
</svg>
