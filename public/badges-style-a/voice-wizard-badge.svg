<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <radialGradient id="voiceWizBg" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FCE7F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F43F88;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="voiceWizGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#F43F88;stop-opacity:0" />
    </radialGradient>
    <filter id="voiceWizGlowFilter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="voiceWizShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#BE123C" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background gradient -->
  <circle cx="140" cy="140" r="130" fill="url(#voiceWizBg)" filter="url(#voiceWizGlowFilter)"/>

  <!-- Glow aura -->
  <circle cx="140" cy="140" r="140" fill="url(#voiceWizGlow)" opacity="0.5"/>

  <!-- Singer character body -->
  <ellipse cx="140" cy="130" rx="32" ry="38" fill="#F3F4F6" filter="url(#voiceWizShadow)"/>

  <!-- Character head -->
  <circle cx="140" cy="105" r="20" fill="#FECACA"/>

  <!-- Hair (singing style) -->
  <path d="M 120 90 Q 120 75 140 70 Q 160 75 160 90" fill="#F43F88"/>

  <!-- Happy expression -->
  <!-- Eyes -->
  <circle cx="130" cy="100" r="3.5" fill="#1F2937"/>
  <circle cx="150" cy="100" r="3.5" fill="#1F2937"/>

  <!-- Joy sparkles in eyes -->
  <circle cx="132" cy="98" r="1.5" fill="#FFD700"/>
  <circle cx="152" cy="98" r="1.5" fill="#FFD700"/>

  <!-- Open mouth (singing O shape) -->
  <ellipse cx="140" cy="112" rx="6" ry="8" fill="#7F1D1D" opacity="0.7"/>

  <!-- Microphone in hand -->
  <g filter="url(#voiceWizShadow)">
    <!-- Microphone stand -->
    <rect x="118" y="145" width="4" height="40" fill="#666"/>

    <!-- Microphone head (sphere) -->
    <circle cx="120" cy="135" r="12" fill="#E5E7EB" stroke="#000" stroke-width="1"/>
    <circle cx="120" cy="135" r="10" fill="#F3F4F6"/>

    <!-- Microphone grid pattern -->
    <g stroke="#999" stroke-width="0.5">
      <line x1="112" y1="135" x2="128" y2="135"/>
      <line x1="110" y1="130" x2="130" y2="130"/>
      <line x1="110" y1="140" x2="130" y2="140"/>
    </g>
  </g>

  <!-- Sound waves emanating from character -->
  <g stroke="#F472B6" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8">
    <!-- Wave 1 (closest) -->
    <path d="M 140 70 Q 155 75 160 85"/>

    <!-- Wave 2 -->
    <path d="M 140 65 Q 170 75 175 100"/>

    <!-- Wave 3 (farthest) -->
    <path d="M 140 60 Q 185 75 190 115"/>
  </g>

  <!-- Musical note particles -->
  <!-- Note 1 -->
  <g transform="translate(170, 110)">
    <circle cx="0" cy="0" r="2" fill="#F43F88"/>
    <path d="M 2 -2 L 2 8" stroke="#F43F88" stroke-width="1" fill="none"/>
  </g>

  <!-- Note 2 -->
  <g transform="translate(175, 95)">
    <circle cx="0" cy="0" r="2" fill="#F43F88"/>
    <path d="M 2 -2 L 2 8" stroke="#F43F88" stroke-width="1" fill="none"/>
  </g>

  <!-- Sparkle particles -->
  <g transform="translate(95, 110)">
    <polygon points="0,-4 1,-1 4,-1 2,1 2.5,4 0,2 -2.5,4 -2,1 -4,-1 -1,-1" fill="#F472B6" opacity="0.9"/>
  </g>

  <g transform="translate(185, 175)">
    <polygon points="0,-3 0.8,-0.5 3,-0.5 1.5,0.8 2,3 0,1.5 -2,3 -1.5,0.8 -3,-0.5 -0.8,-0.5" fill="#F472B6" opacity="0.8"/>
  </g>

  <!-- Badge label -->
  <text x="140" y="245" font-family="Fredoka, Arial" font-size="20" font-weight="900" text-anchor="middle" fill="#F43F88">VOICE WIZARD</text>

  <!-- Collectible card border -->
  <rect x="20" y="20" width="240" height="240" rx="20" fill="none" stroke="#F472B6" stroke-width="3" opacity="0.6"/>

  <!-- Corner accents -->
  <circle cx="30" cy="30" r="4" fill="#F43F88" opacity="0.8"/>
  <circle cx="250" cy="30" r="4" fill="#F43F88" opacity="0.8"/>
  <circle cx="30" cy="250" r="4" fill="#F43F88" opacity="0.8"/>
  <circle cx="250" cy="250" r="4" fill="#F43F88" opacity="0.8"/>
</svg>
