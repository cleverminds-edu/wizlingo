<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <radialGradient id="langWizBg" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="langWizGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>
    <filter id="langWizGlowFilter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="langWizShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background gradient -->
  <circle cx="140" cy="140" r="130" fill="url(#langWizBg)" filter="url(#langWizGlowFilter)"/>

  <!-- Glow aura -->
  <circle cx="140" cy="140" r="140" fill="url(#langWizGlow)" opacity="0.5"/>

  <!-- Wise wizard character body -->
  <ellipse cx="140" cy="135" rx="36" ry="42" fill="#F3F4F6" filter="url(#langWizShadow)"/>

  <!-- Wizard hat (tall, pointed) -->
  <polygon points="140,60 105,115 175,115" fill="#7C3AED"/>
  <path d="M 105 115 Q 140 90 175 115" fill="#6D28D9"/>
  <ellipse cx="140" cy="118" rx="40" ry="10" fill="#5B21B6"/>

  <!-- Hat star (bright) -->
  <polygon points="140,80 143,88 151,88 145,93 148,101 140,96 132,101 135,93 129,88 137,88" fill="#FFD700" opacity="0.95"/>

  <!-- Head -->
  <circle cx="140" cy="110" r="22" fill="#FECACA"/>

  <!-- Long beard (wise) -->
  <path d="M 120 125 Q 130 145 140 150 Q 150 145 160 125" fill="#E5E7EB" filter="url(#langWizShadow)"/>

  <!-- Wise eyes (closed, knowing) -->
  <path d="M 130 105 Q 132 110 130 112" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 150 105 Q 152 110 150 112" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes have sparkles of wisdom -->
  <circle cx="131" cy="103" r="1.5" fill="#FFD700"/>
  <circle cx="149" cy="103" r="1.5" fill="#FFD700"/>

  <!-- Staff in wizard hand -->
  <g filter="url(#langWizShadow)">
    <!-- Staff shaft -->
    <rect x="155" y="125" width="5" height="55" fill="#8B4513" rx="2"/>

    <!-- Staff orb at top -->
    <circle cx="157.5" cy="120" r="10" fill="#A78BFA" filter="url(#langWizGlowFilter)"/>
    <circle cx="157.5" cy="120" r="8" fill="#C4B5FD"/>

    <!-- Mystical energy in orb -->
    <circle cx="157.5" cy="120" r="6" fill="#E9D5FF" opacity="0.7"/>
    <circle cx="157.5" cy="120" r="3" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Stars floating around wizard (knowledge/wisdom) -->
  <!-- Top left -->
  <g transform="translate(95, 85)">
    <polygon points="0,-5 1.5,-1 5,-1 2.5,1.5 3.5,5.5 0,3 -3.5,5.5 -2.5,1.5 -5,-1 -1.5,-1" fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- Top right -->
  <g transform="translate(185, 85)">
    <polygon points="0,-5 1.5,-1 5,-1 2.5,1.5 3.5,5.5 0,3 -3.5,5.5 -2.5,1.5 -5,-1 -1.5,-1" fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- Side sparkles -->
  <g transform="translate(80, 135)">
    <polygon points="0,-4 1,-1 4,-1 2,1 2.5,4 0,2 -2.5,4 -2,1 -4,-1 -1,-1" fill="#A78BFA" opacity="0.85"/>
  </g>

  <g transform="translate(200, 135)">
    <polygon points="0,-4 1,-1 4,-1 2,1 2.5,4 0,2 -2.5,4 -2,1 -4,-1 -1,-1" fill="#A78BFA" opacity="0.85"/>
  </g>

  <!-- Bottom sparkles -->
  <g transform="translate(105, 185)">
    <polygon points="0,-3 0.8,-0.5 3,-0.5 1.5,0.8 2,3 0,1.5 -2,3 -1.5,0.8 -3,-0.5 -0.8,-0.5" fill="#C4B5FD" opacity="0.8"/>
  </g>

  <g transform="translate(175, 185)">
    <polygon points="0,-3 0.8,-0.5 3,-0.5 1.5,0.8 2,3 0,1.5 -2,3 -1.5,0.8 -3,-0.5 -0.8,-0.5" fill="#C4B5FD" opacity="0.8"/>
  </g>

  <!-- Badge label -->
  <text x="140" y="245" font-family="Fredoka, Arial" font-size="18" font-weight="900" text-anchor="middle" fill="#7C3AED">LANGUAGE WIZARD</text>

  <!-- Collectible card border -->
  <rect x="20" y="20" width="240" height="240" rx="20" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.6"/>

  <!-- Corner accents -->
  <circle cx="30" cy="30" r="4" fill="#7C3AED" opacity="0.8"/>
  <circle cx="250" cy="30" r="4" fill="#7C3AED" opacity="0.8"/>
  <circle cx="30" cy="250" r="4" fill="#7C3AED" opacity="0.8"/>
  <circle cx="250" cy="250" r="4" fill="#7C3AED" opacity="0.8"/>
</svg>
