<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <radialGradient id="sparkCharBg" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#FFE66D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="sparkGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0" />
    </radialGradient>
    <filter id="sparkGlowFilter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkCharShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#FF6B00" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background gradient -->
  <circle cx="140" cy="140" r="130" fill="url(#sparkCharBg)" filter="url(#sparkGlowFilter)"/>

  <!-- Glow aura -->
  <circle cx="140" cy="140" r="140" fill="url(#sparkGlow)" opacity="0.5"/>

  <!-- Sparkle character body (round) -->
  <circle cx="140" cy="115" r="45" fill="#FFFDE7" filter="url(#sparkCharShadow)"/>

  <!-- Sparkle character face -->
  <!-- Left eye (big, cute) -->
  <circle cx="125" cy="105" r="7" fill="#1F2937"/>
  <circle cx="127" cy="103" r="3" fill="#FFFFFF"/>

  <!-- Right eye (big, cute) -->
  <circle cx="155" cy="105" r="7" fill="#1F2937"/>
  <circle cx="157" cy="103" r="3" fill="#FFFFFF"/>

  <!-- Happy smile (cute arc) -->
  <path d="M 130 120 Q 140 128 150 120" stroke="#F97316" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Flame tail beneath character (stylized, glowing) -->
  <g filter="url(#sparkCharShadow)">
    <!-- Flame base -->
    <ellipse cx="140" cy="155" rx="25" ry="30" fill="#FFB81C"/>

    <!-- Flame middle -->
    <path d="M 120 155 Q 115 135 125 115 Q 130 125 135 140" fill="#FFEB3B"/>
    <path d="M 160 155 Q 165 135 155 115 Q 150 125 145 140" fill="#FFEB3B"/>

    <!-- Flame tip (bright) -->
    <polygon points="140,100 130,125 150,125" fill="#FDD835"/>
  </g>

  <!-- Floating sparkle particles around character -->
  <!-- Top left -->
  <g transform="translate(95, 85)">
    <polygon points="0,-5 1.5,-1 5,-1 2.5,1.5 3.5,5.5 0,3 -3.5,5.5 -2.5,1.5 -5,-1 -1.5,-1" fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- Top right -->
  <g transform="translate(185, 85)">
    <polygon points="0,-5 1.5,-1 5,-1 2.5,1.5 3.5,5.5 0,3 -3.5,5.5 -2.5,1.5 -5,-1 -1.5,-1" fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- Bottom left -->
  <g transform="translate(100, 180)">
    <polygon points="0,-4 1,-1 4,-1 2,1 2.5,4 0,2 -2.5,4 -2,1 -4,-1 -1,-1" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- Bottom right -->
  <g transform="translate(180, 180)">
    <polygon points="0,-4 1,-1 4,-1 2,1 2.5,4 0,2 -2.5,4 -2,1 -4,-1 -1,-1" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- Badge label at bottom -->
  <text x="140" y="245" font-family="Fredoka, Arial" font-size="24" font-weight="900" text-anchor="middle" fill="#F97316">SPARK</text>

  <!-- Collectible card border (frame) -->
  <rect x="20" y="20" width="240" height="240" rx="20" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.6"/>

  <!-- Corner accents (collectible card effect) -->
  <circle cx="30" cy="30" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="250" cy="30" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="30" cy="250" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="250" cy="250" r="4" fill="#FFD700" opacity="0.8"/>
</svg>
